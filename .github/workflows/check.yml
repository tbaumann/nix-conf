# This file is automatically generated from Nix configuration. Do not edit directly.

jobs:
  check:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          ping: nas.tail84117.ts.net
          tags: tag:ci
      - name: Setup Nix
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Deploy Clan
        run: nix run git+https://git.clan.lol/clan/clan-core -- machines update --tags ci
name: Check Nix configuration
"on":
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch: {}
